name: Run WAHA on GitHub
on: 
  workflow_dispatch: # Allows you to start it manually

jobs:
  run-container:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and Run WAHA
        run: |
          docker run -d -p 3000:3000 \
          -e WAHA_API_KEY=YourSecretToken \
          -e WHATSAPP_DEFAULT_SESSION_NAME=default \
          ghcr.io/rdhimancoder/waha:chrome-2026.4.1

      - name: Create Public Tunnel
        run: |
          npx localtunnel --port 3000
